version: '3.9'

services:
  resume-screener:
    build:
      context: .
      dockerfile: Dockerfile
    image: resume-screener:latest
    container_name: resume-screener
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    volumes:
      - /tmp/uploads:/tmp/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
