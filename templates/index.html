<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeIQ — Automated Resume Screener</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #0b0c10;
      --surface:  #13151a;
      --border:   #252830;
      --accent:   #00e5c8;
      --accent2:  #ff5f6d;
      --text:     #e8eaf0;
      --muted:    #6b7280;
      --success:  #00e5c8;
      --reject:   #ff5f6d;
      --radius:   12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,200,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,200,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blob */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(0,229,200,.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
      position: relative;
      z-index: 1;
      animation: fadeDown .6s ease both;
    }

    .logo-tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: .18em;
      color: var(--accent);
      background: rgba(0,229,200,.08);
      border: 1px solid rgba(0,229,200,.25);
      border-radius: 100px;
      padding: 4px 14px;
      margin-bottom: 18px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.1;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .04em;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 40px;
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
      animation: fadeUp .6s .1s ease both;
    }

    .form-group { margin-bottom: 28px; }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
      font-weight: 500;
    }

    /* File drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(0,229,200,.04);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 32px; margin-bottom: 8px; }
    .drop-text { font-size: 13px; color: var(--muted); }
    .drop-text strong { color: var(--accent); }
    .file-name {
      margin-top: 10px;
      font-size: 12px;
      color: var(--accent);
      display: none;
    }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 14px 16px;
      resize: vertical;
      min-height: 140px;
      transition: border-color .2s;
      line-height: 1.6;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: .04em;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto;
    }
    .btn.loading span { display: none; }
    .btn.loading .spinner { display: block; }

    /* ── Result ── */
    #result {
      margin-top: 28px;
      display: none;
      animation: fadeUp .4s ease both;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .result-status {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
    }
    .result-status.selected { color: var(--success); }
    .result-status.rejected { color: var(--reject); }

    /* Score ring */
    .score-ring {
      position: relative;
      width: 90px; height: 90px;
      flex-shrink: 0;
    }
    .score-ring svg { transform: rotate(-90deg); }
    .score-ring circle {
      fill: none;
      stroke-width: 7;
      stroke-linecap: round;
    }
    .ring-bg  { stroke: var(--border); }
    .ring-fill { transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1); }
    .score-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
    }

    /* Progress bar */
    .progress-wrap { margin-bottom: 24px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 11px; letter-spacing: .1em;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 8px;
      background: var(--border);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 100px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
      background: linear-gradient(90deg, var(--accent), #00bfa5);
    }
    .progress-fill.low {
      background: linear-gradient(90deg, var(--reject), #c0392b);
    }

    /* Keyword lists */
    .kw-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .kw-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .kw-box-title {
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .kw-box-title.match { color: var(--success); }
    .kw-box-title.miss  { color: var(--reject);  }
    .kw-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 100px;
    }
    .tag.match {
      background: rgba(0,229,200,.1);
      border: 1px solid rgba(0,229,200,.25);
      color: var(--success);
    }
    .tag.miss {
      background: rgba(255,95,109,.08);
      border: 1px solid rgba(255,95,109,.2);
      color: var(--reject);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    .error-box {
      background: rgba(255,95,109,.08);
      border: 1px solid rgba(255,95,109,.3);
      border-radius: var(--radius);
      padding: 14px 18px;
      color: var(--reject);
      font-size: 13px;
      display: none;
      margin-top: 16px;
    }

    @keyframes fadeUp   { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:none } }
    @keyframes fadeDown { from { opacity:0; transform:translateY(-12px) } to { opacity:1; transform:none } }
    @keyframes spin     { to { transform: rotate(360deg) } }

    @media (max-width: 520px) {
      .card { padding: 24px 20px; }
      .kw-grid { grid-template-columns: 1fr; }
      .result-header { flex-direction: column; gap: 16px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-tag">// DevOps Project</div>
  <h1>Resume<span>IQ</span></h1>
  <p class="subtitle">Automated Resume Screening System &mdash; Keyword Intelligence Engine</p>
</header>

<div class="card">
  <div class="form-group">
    <label>01 &mdash; Upload Resume (PDF or TXT)</label>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="resumeFile" accept=".pdf,.txt" />
      <div class="drop-icon">📄</div>
      <div class="drop-text"><strong>Click to upload</strong> or drag &amp; drop</div>
      <div class="drop-text" style="margin-top:4px">PDF or TXT · Max 5 MB</div>
      <div class="file-name" id="fileName"></div>
    </div>
  </div>

  <div class="form-group">
    <label>02 &mdash; Job Description</label>
    <textarea id="jobDesc" placeholder="Paste the full job description here. Include required skills, technologies, and responsibilities…"></textarea>
  </div>

  <button class="btn" id="screenBtn" onclick="screenResume()">
    <span>Analyze Resume</span>
    <div class="spinner"></div>
  </button>

  <div class="error-box" id="errorBox"></div>

  <!-- Result -->
  <div id="result">
    <hr class="divider"/>

    <div class="result-header">
      <div>
        <div style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Screening Result</div>
        <div class="result-status" id="resultStatus"></div>
      </div>
      <div class="score-ring">
        <svg viewBox="0 0 90 90" width="90" height="90">
          <circle class="ring-bg"   cx="45" cy="45" r="38"/>
          <circle class="ring-fill" cx="45" cy="45" r="38" id="ringFill"
                  stroke-dasharray="238.76"
                  stroke-dashoffset="238.76"/>
        </svg>
        <div class="score-num" id="scoreNum">0</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Match Score</span>
        <span id="progressLabel">0 / 100</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="kw-grid">
      <div class="kw-box">
        <div class="kw-box-title match">✓ Matched Keywords</div>
        <div class="kw-tags" id="matchedTags"></div>
      </div>
      <div class="kw-box">
        <div class="kw-box-title miss">✗ Missing Keywords</div>
        <div class="kw-tags" id="missingTags"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // Drag-and-drop styling
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop',      e => { e.preventDefault(); dz.classList.remove('dragover'); });

  document.getElementById('resumeFile').addEventListener('change', function() {
    const fn = document.getElementById('fileName');
    if (this.files[0]) {
      fn.textContent = '📎 ' + this.files[0].name;
      fn.style.display = 'block';
    }
  });

  async function screenResume() {
    const fileInput = document.getElementById('resumeFile');
    const jobDesc   = document.getElementById('jobDesc').value.trim();
    const btn       = document.getElementById('screenBtn');
    const errBox    = document.getElementById('errorBox');

    errBox.style.display = 'none';
    document.getElementById('result').style.display = 'none';

    if (!fileInput.files[0]) return showError('Please upload a resume file.');
    if (!jobDesc)            return showError('Please enter a job description.');

    btn.classList.add('loading');
    btn.disabled = true;

    const fd = new FormData();
    fd.append('resume', fileInput.files[0]);
    fd.append('job_description', jobDesc);

    try {
      const res  = await fetch('/screen', { method: 'POST', body: fd });
      const data = await res.json();

      if (!res.ok) { showError(data.error || 'Server error.'); return; }
      renderResult(data);
    } catch(e) {
      showError('Network error. Is the server running?');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function renderResult(d) {
    const score    = d.score;
    const isGood   = score >= 60;
    const CIRC     = 238.76;

    document.getElementById('resultStatus').textContent  = d.status;
    document.getElementById('resultStatus').className    = 'result-status ' + (isGood ? 'selected' : 'rejected');
    document.getElementById('scoreNum').textContent      = score;
    document.getElementById('ringFill').style.stroke     = isGood ? 'var(--success)' : 'var(--reject)';
    document.getElementById('progressLabel').textContent = score + ' / 100';

    const pf = document.getElementById('progressFill');
    pf.className = 'progress-fill' + (isGood ? '' : ' low');

    // Animate after paint
    requestAnimationFrame(() => {
      document.getElementById('ringFill').style.strokeDashoffset = CIRC - (CIRC * score / 100);
      pf.style.width = score + '%';
    });

    // Keywords
    const mt = document.getElementById('matchedTags');
    const ms = document.getElementById('missingTags');
    mt.innerHTML = d.matched.map(k => `<span class="tag match">${k}</span>`).join('') || '<span style="color:var(--muted);font-size:12px">None matched</span>';
    ms.innerHTML = d.missing.map(k => `<span class="tag miss">${k}</span>`).join('')  || '<span style="color:var(--muted);font-size:12px">All covered!</span>';

    document.getElementById('result').style.display = 'block';
    document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function showError(msg) {
    const e = document.getElementById('errorBox');
    e.textContent = '⚠ ' + msg;
    e.style.display = 'block';
  }
</script>
</body>
</html>
